<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CPU Scheduling Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>⚙️ CPU Scheduling Simulator</h1>

    <!-- Input Card -->
    <div class="card">
        <h2>Add Process</h2>
        <div class="inputs">
            <input type="number" id="at" placeholder="Arrival Time">
            <input type="number" id="bt" placeholder="Burst Time">
            <input type="number" id="priority" placeholder="Priority">
            <button onclick="addProcess()">➕ Add</button>
        </div>
    </div>

    <!-- Control Panel -->
    <div class="card">
        <h2>Controls</h2>
        <div class="controls">
            <select id="algo">
                <option value="fcfs">FCFS</option>
                <option value="sjf">SJF</option>
                <option value="srtf">SRTF</option>
                <option value="priority">Priority</option>
                <option value="rr">Round Robin</option>
            </select>

            <input type="number" id="quantum" placeholder="Time Quantum">

            <button class="run-btn" onclick="calculate()">🚀 Run</button>
            <button class="clear-btn" onclick="clearAll()">🧹 Clear</button>
        </div>
    </div>

    <!-- Table -->
    <div class="card">
        <h2>Process Table</h2>
        <table id="table"></table>
    </div>

    <!-- Gantt Chart -->
    <div class="card">
        <h2>Gantt Chart</h2>
        <div id="gantt"></div>
    </div>

    <!-- Stats -->
    <div class="card stats">
        <h2>Statistics</h2>
        <p id="avg"></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
